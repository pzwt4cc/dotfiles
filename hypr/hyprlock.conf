# General Settings
general {
    ignore_empty_input = true
    hide_cursor = true
}

# Background
background {
    monitor =
    path = ~/.config/hypr/assets/background.jpg           # Background image path
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Password Input Field
input-field {
    monitor =
    size = 250, 55
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(100, 114, 125, 0.4)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    font_family = Sans
    placeholder_text = <span foreground="##ffffff99">Enter Pass</span>
    hide_input = false
    position = 0, -153
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = $TIME
    color = rgba(216, 222, 233, 0.70)
    font_size = 140
    font_family = Sans
    position = 0, 460
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(216, 222, 233, 0.70)
    font_size = 30
    font_family = Sans
    position = 0, 340
    halign = center
    valign = center
}

# Lock Icon
label {
    monitor =
    text = <span> </span>
    color = rgba(216, 222, 233, 0.70)
    font_size = 24
    font_family = Sans
    position = 2, -120
    halign = center
    valign = top
}

# Profile photo
image {
    monitor =
    path = ~/.config/hypr/assets/user.png               # Profile photo path
    border_color = rgba(216, 222, 233, 0.70)
    border_size = 3
    size = 250
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 70
    halign = center
    valign = center
}

# Username greeting
label {
    monitor =
    text = $USER
    color = rgba(216, 222, 233, 0.70)
    font_size = 20
    font_family = Sans
    position = 0, -90
    halign = center
    valign = center
}